<div class="social-wrap">
  <form class="social-card">
    <h2>Sign In</h2>
    <button type="button" class="social-btn google">Continue with Google</button>
    <button type="button" class="social-btn github">Continue with GitHub</button>
    <div class="divider"><span>or</span></div>
    <input type="email" placeholder="Email">

    <button type="submit" class="primary">Sign In</button>
  </form>
</div>
