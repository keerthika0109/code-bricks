<div class="step-wrap">
  <form class="step-card" id="stepForm">
    <h2>Sign In</h2>
    <div class="step" id="step1">
      <input type="email" placeholder="Email" id="stepEmail">
      <button type="button" id="nextStep">Continue</button>
    </div>
    <div class="step" id="step2" hidden>
      <p class="email-display" id="emailDisplay"></p>
      <input type="password" placeholder="Password">
      <button type="submit">Sign In</button>
    </div>
  </form>
</div>
