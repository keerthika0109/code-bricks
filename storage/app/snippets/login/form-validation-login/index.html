<div class="valid-wrap">
  <form class="valid-card" id="validForm">
    <h2>Sign In</h2>
    <input type="email" placeholder="Email" id="valEmail">
    <p class="error" id="emailError" hidden>Please enter a valid email.</p>
    <input type="password" placeholder="Password" id="valPass">
    <p class="error" id="passError" hidden>Password must be at least 6 characters.</p>
    <button type="submit">Sign In</button>
  </form>
</div>
